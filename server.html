<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>ニコリタウン - サーバー</title>
  <style>
    :root{
      color-scheme:light;
      --bg:#f4fbff;
      --surface:rgba(255,255,255,.78);
      --surface-strong:rgba(255,255,255,.94);
      --line:rgba(79,137,168,.22);
      --text:#123047;
      --muted:#658096;
      --blue:#35b9e8;
      --blue-strong:#0e9ed0;
      --mint:#65dcc8;
      --violet:#b9a8ff;
      --danger:#f56f7f;
      --danger-strong:#e5485d;
      --shadow:0 22px 60px rgba(50,122,163,.18);
      --soft-shadow:0 12px 30px rgba(50,122,163,.12);
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      min-height:100svh;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 12%,rgba(101,220,200,.32),transparent 28%),
        radial-gradient(circle at 92% 8%,rgba(185,168,255,.30),transparent 26%),
        linear-gradient(145deg,#f9fdff 0%,#e9f8ff 42%,#f9f5ff 100%);
      overflow-x:hidden;
    }
    body::before,body::after{
      content:"";
      position:fixed;
      left:-8vw;
      right:-8vw;
      height:220px;
      pointer-events:none;
      z-index:-1;
      background:
        radial-gradient(80px 36px at 6% 64%,rgba(53,185,232,.18),transparent 72%),
        radial-gradient(120px 42px at 24% 44%,rgba(101,220,200,.22),transparent 72%),
        radial-gradient(160px 52px at 45% 62%,rgba(185,168,255,.18),transparent 72%),
        radial-gradient(130px 48px at 70% 46%,rgba(53,185,232,.16),transparent 72%),
        radial-gradient(90px 36px at 91% 58%,rgba(101,220,200,.20),transparent 72%);
      filter:blur(.2px);
    }
    body::before{top:86px;transform:rotate(-2deg)}
    body::after{bottom:28px;transform:rotate(3deg);opacity:.75}
    button,input,textarea,select{font:inherit}
    button{
      border:0;
      border-radius:18px;
      padding:11px 16px;
      color:white;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(135deg,var(--blue),var(--mint));
      box-shadow:0 10px 22px rgba(14,158,208,.20);
      transition:transform .16s ease,box-shadow .16s ease,filter .16s ease;
    }
    button:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(14,158,208,.24)}
    button:disabled{cursor:not-allowed;opacity:.55;transform:none;box-shadow:none}
    button.secondary{background:rgba(255,255,255,.76);border:1px solid var(--line);color:var(--text);box-shadow:none}
    button.secondary.active{background:linear-gradient(135deg,#3b82f6,#35b9e8);border-color:rgba(59,130,246,.35);color:white;box-shadow:0 10px 22px rgba(59,130,246,.20)}
    button.ghost{background:transparent;border:1px solid transparent;color:var(--muted);box-shadow:none}
    button.danger{background:linear-gradient(135deg,var(--danger),var(--danger-strong));color:white}
    button.small{padding:7px 10px;border-radius:12px;font-size:12px}
    input,textarea,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.86);
      color:var(--text);
      padding:12px 14px;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
    }
    textarea{min-height:92px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:rgba(53,185,232,.65);box-shadow:0 0 0 4px rgba(53,185,232,.14)}
    label{display:grid;gap:7px;color:#31556d;font-size:13px;font-weight:800}
    .shell{width:min(1720px,98vw);margin:0 auto;padding:14px 0 18px}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:12px;
      padding:13px 16px;
      border:1px solid rgba(255,255,255,.68);
      border-radius:28px;
      background:rgba(255,255,255,.56);
      box-shadow:var(--soft-shadow);
      backdrop-filter:blur(16px);
    }
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#dff9ff,#f1edff);font-size:25px;box-shadow:inset 0 0 0 1px rgba(53,185,232,.18)}
    .title{font-size:24px;font-weight:950;letter-spacing:.02em}
    .sub{color:var(--muted);font-size:13px;margin-top:3px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .panel{
      border:1px solid rgba(255,255,255,.72);
      border-radius:30px;
      background:var(--surface);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      padding:18px;
    }
    .gate{padding:22px;border:1px dashed rgba(53,185,232,.38);border-radius:24px;background:rgba(255,255,255,.72);color:var(--muted);font-weight:800}
    .server-actions{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    .action-card{display:grid;gap:12px;padding:16px;border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.72)}
    .action-card h2{font-size:17px;margin:0}
    .action-card button{justify-self:end;min-width:128px}
    .section-title{font-weight:950;margin:0 0 10px}
    .status{min-height:24px;color:#087fa8;font-weight:850;font-size:13px;margin:8px 0 12px}
    .toast{position:fixed;right:18px;bottom:18px;display:grid;gap:8px;z-index:30}
    .toast-item{padding:12px 14px;border-radius:18px;background:var(--surface-strong);box-shadow:var(--soft-shadow);border:1px solid var(--line);font-weight:850;color:var(--text)}
    .server-list{display:grid;gap:10px}
    .server-card{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:center;
      padding:12px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(255,255,255,.76);
      transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;
    }
    .server-card:hover,.server-card.active{transform:translateY(-1px);box-shadow:var(--soft-shadow);border-color:rgba(53,185,232,.42)}
    .server-icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#e6fbff,#f1edff);border:1px solid rgba(53,185,232,.22);font-size:24px}
    .server-name{font-weight:950}
    .server-host,.empty,.hint{font-size:12px;color:var(--muted);line-height:1.6}
    .server-workspace{
      display:grid;
      grid-template-columns:220px 280px minmax(620px,1fr) 260px;
      gap:12px;
      align-items:stretch;
      min-height:calc(100svh - 126px);
      height:calc(100svh - 126px);
    }
    .rail,.rooms-pane,.main-pane,.right-pane{
      border:1px solid rgba(255,255,255,.72);
      border-radius:28px;
      background:rgba(255,255,255,.72);
      box-shadow:var(--soft-shadow);
      backdrop-filter:blur(16px);
      min-width:0;
    }
    .rail,.rooms-pane,.right-pane{padding:12px;overflow:auto}
    .main-pane{display:flex;flex-direction:column;overflow:hidden}
    .pane-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    .servers-mini{display:grid;gap:9px;overflow:auto;padding-right:2px}
    .mini-server{
      width:100%;
      display:grid;
      grid-template-columns:auto 1fr;
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:20px;
      background:rgba(255,255,255,.62);
      border:1px solid transparent;
      color:var(--text);
      text-align:left;
      box-shadow:none;
    }
    .mini-server.active{background:linear-gradient(135deg,rgba(229,250,255,.96),rgba(243,239,255,.96));border-color:rgba(53,185,232,.42)}
    .room-group{margin:14px 0}
    .room-group-title{font-size:11px;font-weight:950;color:#5e839a;letter-spacing:.08em;margin:0 0 7px;text-transform:uppercase}
    .room-list{display:grid;gap:6px}
    .room-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 8px 8px 10px;
      border-radius:16px;
      border:1px solid transparent;
      background:rgba(255,255,255,.56);
    }
    .room-row.active{background:linear-gradient(135deg,rgba(217,248,255,.96),rgba(234,251,246,.96));border-color:rgba(53,185,232,.42)}
    .room-button{border:0;background:transparent;color:var(--text);box-shadow:none;text-align:left;padding:0;border-radius:0;display:grid;gap:2px}
    .room-button:hover{transform:none;box-shadow:none}
    .room-name{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .room-description{display:none}
    .room-menu{display:flex;gap:4px;opacity:.35;transition:opacity .16s ease}
    .room-row:hover .room-menu,.room-row.active .room-menu{opacity:1}
    .room-create{width:100%;margin-top:7px;background:rgba(255,255,255,.72);border:1px solid var(--line);color:#14506a;box-shadow:none}
    .main-head{padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.90),rgba(229,250,255,.78))}
    .main-title{font-size:20px;font-weight:950}
    .main-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .content{padding:14px;min-height:0;flex:1;display:flex;flex-direction:column;overflow:hidden}
    .chat{flex:1;min-height:330px;overflow:auto;display:grid;align-content:start;gap:10px;padding:4px 4px 12px}
    .msg{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.78);
    }
    .msg-name{font-weight:950;color:#087fa8}
    .msg-meta{font-size:11px;color:var(--muted);margin-left:6px}
    .msg-text{white-space:pre-wrap;word-break:break-word;margin-top:5px;line-height:1.55}
    .msg-actions{display:flex;gap:5px;align-items:start}
    .chat-form{display:grid;grid-template-columns:1fr auto;gap:10px;padding-top:10px;border-top:1px solid var(--line)}
    .chat-form textarea{min-height:54px;max-height:160px}
    .settings{display:grid;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
    .member-row{display:grid;gap:6px;padding:9px 0;border-bottom:1px solid rgba(79,137,168,.14);font-size:13px}
    .member-role{font-size:11px;color:var(--muted)}
    .info-card{padding:13px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.68)}
    .server-map-wrap{display:grid;grid-template-rows:auto minmax(0,1fr) auto auto;gap:10px;min-height:0;flex:1}
    .server-map-embed{display:grid;grid-template-rows:minmax(0,1fr);min-height:0;flex:1}
    .server-map-frame{width:100%;height:100%;min-height:620px;border:1px solid var(--line);border-radius:24px;background:#dff9ff;box-shadow:var(--soft-shadow)}
    .server-map-stage{position:relative;align-self:start;width:100%;max-height:100%;aspect-ratio:16 / 9;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:linear-gradient(135deg,#dff9ff,#e9fff8 46%,#f1edff)}
    #serverMapCanvas{display:block;width:100%;height:100%;background:transparent;outline:none}
    .server-map-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .server-map-chat{display:grid;grid-template-columns:1fr auto;gap:10px}
    .server-map-chat-log{max-height:96px;overflow:auto;display:grid;gap:8px}
    .server-map-chip{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:850}
    .floor-toggle{position:absolute;top:12px;left:12px;z-index:3;width:44px;height:44px;border-radius:16px;padding:0;font-size:22px}
    .floor-slider-panel{position:absolute;top:64px;left:12px;z-index:4;width:190px;padding:12px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.92);box-shadow:var(--soft-shadow)}
    .floor-numbers{display:flex;justify-content:space-between;font-weight:950;color:#087fa8;margin-bottom:8px}
    .floor-slider{accent-color:#35b9e8}
    .modal-backdrop{position:fixed;inset:0;display:grid;place-items:center;background:rgba(29,67,86,.28);z-index:40;padding:18px;backdrop-filter:blur(8px)}
    .modal{width:min(460px,100%);border:1px solid rgba(255,255,255,.78);border-radius:28px;background:var(--surface-strong);box-shadow:var(--shadow);padding:18px;display:grid;gap:12px}
    .modal h2{margin:0;font-size:20px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
    [hidden]{display:none!important}
    @media(min-width:1500px){.server-workspace{grid-template-columns:230px 290px minmax(760px,1fr) 280px}}
    @media(max-width:1180px){.server-workspace{grid-template-columns:220px 260px 1fr;height:auto}.right-pane{grid-column:1 / -1}.server-actions{grid-template-columns:1fr}}
    @media(max-width:820px){.shell{width:min(100% - 22px,720px)}.topbar{align-items:flex-start;flex-direction:column}.server-workspace{grid-template-columns:1fr;min-height:0}.chat-form{grid-template-columns:1fr}.server-card{grid-template-columns:auto 1fr}.server-card button{grid-column:1 / -1}.action-card button{justify-self:stretch}.server-map-frame{min-height:72vh}}
  </style>
  <link rel="stylesheet" href="./wave-ui.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">🌊</div>
        <div>
          <div class="title">ニコリタウン サーバー</div>
          <div class="sub" id="userLabel">確認中...</div>
        </div>
      </div>
      <div class="row">
        <button id="googleLoginBtn" class="secondary" type="button">Googleログイン</button>
        <button id="homeBtn" class="secondary" type="button">ホームに戻る</button>
      </div>
    </header>

    <section id="gate" class="gate" hidden>サーバー機能を使うにはGoogleログインが必要です。</section>

    <section id="serverHome" class="panel" hidden>
      <div class="server-actions">
        <div class="action-card">
          <h2>参加コードで参加</h2>
          <label>15ケタ参加コード
            <input id="serverJoinCode" maxlength="15" inputmode="text" pattern="[A-Za-z0-9]{15}" placeholder="例）A1B2C3D4E5F6G7H" autocomplete="one-time-code" />
          </label>
          <button id="serverJoinBtn" type="button">参加</button>
        </div>
        <div class="action-card">
          <h2>新規サーバー作成</h2>
          <label>新規サーバー名
            <input id="serverCreateName" maxlength="28" placeholder="例）ニコリヒトサーバー" autocomplete="off" />
          </label>
          <button id="serverCreateBtn" class="secondary" type="button">サーバー作成</button>
        </div>
      </div>
      <div id="serverStatus" class="status"></div>
      <div class="section-title">サーバー一覧</div>
      <div id="serverList" class="server-list"></div>
    </section>

    <section id="serverApp" class="server-workspace" hidden>
      <aside class="rail">
        <div class="pane-head">
          <div>
            <div class="section-title">サーバー</div>
            <div class="hint">参加中のサーバー</div>
          </div>
          <button id="serverCloseBtn" type="button" class="secondary small">閉じる</button>
        </div>
        <div id="serverListRail" class="servers-mini"></div>
      </aside>

      <aside class="rooms-pane">
        <div class="pane-head">
          <div class="brand">
            <div id="activeServerIcon" class="server-icon">🌐</div>
            <div>
              <div id="activeServerName" class="server-name">-</div>
              <div id="activeServerRole" class="server-host">-</div>
            </div>
          </div>
        </div>
        <div id="serverRooms"></div>
        <div id="serverRoomCreateTools"></div>
      </aside>

      <section class="main-pane">
        <div class="main-head">
          <div class="main-title" id="activeRoomTitle">ルームを選択してください</div>
          <div class="main-sub" id="activeRoomDescription">左の一覧からルームを開けます。</div>
        </div>
        <div id="serverRoomContent" class="content"></div>
      </section>

      <aside class="right-pane">
        <div class="section-title">メンバー</div>
        <div id="serverMembers"></div>
        <div id="serverSettings" class="settings" hidden></div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>
  <div id="modalRoot"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';
    import { getDatabase, ref, update, get, remove, set, push, onValue, off, onDisconnect, query as dbQuery, orderByChild, equalTo } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';

    const firebaseConfig = {
      apiKey:'AIzaSyCy3P-HQhfd8-zpPUJ5YANxwRMuTCjFFAQ',
      authDomain:'nikori-town.firebaseapp.com',
      databaseURL:'https://nikori-town-default-rtdb.asia-southeast1.firebasedatabase.app',
      projectId:'nikori-town',
      storageBucket:'nikori-town.appspot.com',
      messagingSenderId:'836836010871',
      appId:'1:836836010871:web:74ae40cb16ee6d50368f72'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt:'select_account' });
    const db = getDatabase(app, firebaseConfig.databaseURL);
    const $ = id => document.getElementById(id);
    const state = {
      servers:[],
      listUnsub:null,
      roomsUnsub:null,
      membersUnsub:null,
      messagesUnsub:null,
      voiceUnsub:null,
      mapPlayersUnsub:null,
      mapMessagesUnsub:null,
      mapStateUnsub:null,
      mapResizeObserver:null,
      mapLoop:null,
      mapKeys:new Set(),
      mapRoomId:null,
      mapPlayers:{},
      mapMessages:[],
      mapState:{},
      mapLocal:null,
      activeServer:null,
      activeMember:null,
      activeRoom:null,
      rooms:{},
      members:{}
    };

    const safeText = value => String(value ?? '').replace(/[<>&"']/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[ch]));
    const safeName = value => String(value || '').trim().slice(0, 28) || 'ゲスト';
    const safeDescription = value => String(value || '').trim().slice(0, 120);
    const userName = user => safeName(user?.displayName || 'Googleユーザー');
    const isGoogleUser = user => Boolean(user && !user.isAnonymous);
    const setStatus = text => { $('serverStatus').textContent = text || ''; if (text) toast(text); };
    async function copyText(value, successText = 'コピーしました'){
      const text = String(value || '').trim();
      if (!text) return setStatus('コピーするコードがありません。');
      try {
        await navigator.clipboard.writeText(text);
        setStatus(successText);
      } catch (error) {
        console.error('copy failed', error);
        setStatus('コピーに失敗しました。');
      }
    }
    const safeCode = value => String(value || '').replace(/[^a-z0-9]/gi, '').toUpperCase().slice(0, 15);
    const isCode = value => /^[A-Z0-9]{15}$/.test(String(value || ''));
    const getServerId = server => server?.serverId || server?.id || '';
    const roleLabel = role => role === 'operator' ? 'operator' : role === 'guest' ? 'guest' : 'member';
    const roomType = type => ['chat','map','voice'].includes(String(type || '').trim().toLowerCase()) ? String(type || '').trim().toLowerCase() : 'chat';
    const canOperate = () => state.activeMember?.role === 'operator' || state.activeServer?.hostUid === auth.currentUser?.uid;
    const canDeleteServer = () => Boolean(auth.currentUser?.uid && state.activeServer?.hostUid === auth.currentUser.uid);
    const memberName = member => `${safeName(member?.name)}${state.activeServer?.hostUid === member?.uid ? ' 👑' : ''}${member?.role === 'operator' && state.activeServer?.hostUid !== member?.uid ? ' OP' : ''}`;
    const normalizeRoom = (roomId, room = {}) => ({
      ...room,
      roomId,
      id:roomId,
      serverId:room.serverId || getServerId(state.activeServer),
      type:roomType(room.type),
      name:safeName(room.name || 'ルーム'),
      description:safeDescription(room.description || '')
    });
    const todayKey = () => {
      const parts = new Intl.DateTimeFormat('en-CA', { timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(new Date());
      const values = Object.fromEntries(parts.map(part => [part.type, part.value]));
      return `${values.year}-${values.month}-${values.day}`;
    };
    const describeError = (error, fallback) => {
      const code = error?.code || '';
      const message = error?.message || String(error || '');
      if (code.includes('permission') || /permission|PERMISSION_DENIED/i.test(message)) return `${fallback} Firebase Realtime Database の権限が拒否されています。(${code || message})`;
      return code || message ? `${fallback} ${code ? `${code}: ` : ''}${message}` : fallback;
    };
    const randomCode = () => {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let out = '';
      for (let i = 0; i < 15; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    };
    const createServerId = () => `server_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,10)}`;
    const MAPS = [

    function modal({ title, body, fields = [], danger = false, confirmText = '保存' }){
      return new Promise(resolve => {
        const root = $('modalRoot');
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        const fieldHtml = fields.map(field => {
        if (field.type === 'select') {
          const options = (field.options || []).map(option => `<option value="${safeText(option.value)}"${option.value === field.value ? ' selected' : ''}>${safeText(option.label)}</option>`).join('');
          return `<label>${safeText(field.label)}<select id="modal_${field.id}">${options}</select></label>`;
        }
        const tag = field.type === 'textarea' ? 'textarea' : 'input';
        const attrs = tag === 'textarea' ? '' : `type="${field.type || 'text'}"`;
        return `<label>${safeText(field.label)}<${tag} ${attrs} id="modal_${field.id}" maxlength="${field.max || 120}">${tag === 'textarea' ? safeText(field.value || '') : ''}</${tag}></label>`;
        }).join('');
        backdrop.innerHTML = `<div class="modal"><h2>${safeText(title)}</h2><div class="hint">${safeText(body || '')}</div>${fieldHtml}<div class="modal-actions"><button id="modalCancel" class="secondary" type="button">キャンセル</button><button id="modalOk" class="${danger ? 'danger' : ''}" type="button">${safeText(confirmText)}</button></div></div>`;
        root.appendChild(backdrop);
        fields.forEach(field => {
          const input = $(`modal_${field.id}`);
          if (input && input.tagName === 'INPUT') input.value = field.value || '';
        });
        $('modalCancel').onclick = () => { backdrop.remove(); resolve(null); };
        $('modalOk').onclick = () => {
          const values = {};
          fields.forEach(field => values[field.id] = $(`modal_${field.id}`)?.value || '');
          backdrop.remove();
          resolve(values);
        };
      });
    }

    async function findServerByJoinCode(code){
      const codeSnap = await get(ref(db, `serverCodes/${code}`)).catch(error => {
        console.error('serverCodes lookup failed', { path:`serverCodes/${code}`, code }, error);
        return null;
      });
      const codeData = codeSnap?.val();
      if (codeData?.serverId && codeData.joinCodeDate === todayKey()) {
        const server = (await get(ref(db, `servers/${codeData.serverId}`)).catch(error => {
          console.error('servers lookup by serverCodes failed', { path:`servers/${codeData.serverId}`, code }, error);
          throw error;
        }))?.val();
        if (server?.joinCode === code && server?.joinCodeDate === todayKey()) return { ...server, serverId:codeData.serverId, id:codeData.serverId };
      }
      const snap = await get(dbQuery(ref(db, 'servers'), orderByChild('joinCode'), equalTo(code)));
      for (const [serverId, server] of Object.entries(snap.val() || {})) {
        if (server?.joinCode === code && server?.joinCodeDate === todayKey()) return { ...server, serverId, id:serverId };
      }
      return null;
    }
    async function reserveJoinCode(id){
      for (let i = 0; i < 50; i++) {
        const code = randomCode();
        const existing = await findServerByJoinCode(code);
        if (!existing || existing.id === id) return code;
      }
      throw new Error('SERVER_CODE_EXHAUSTED');
    }
    async function ensureDailyCode(server){
      const date = todayKey();
      const id = getServerId(server);
      if (server?.joinCode && server.joinCodeDate === date) return server;
      const joinCode = await reserveJoinCode(id);
      const patch = { joinCode, joinCodeDate:date, updatedAt:Date.now() };
      await update(ref(db, `servers/${id}`), patch);
      await update(ref(db, `serverCodes/${joinCode}`), { serverId:id, joinCode, joinCodeDate:date, updatedAt:Date.now() }).catch(error => console.error('serverCodes daily write failed', error));
      return Object.assign(server, patch);
    }

    function serverMapMove(local, dx, dy){
      if (!dx && !dy) return;
      if (Math.abs(dx) > Math.abs(dy)) local.dir = dx < 0 ? 'left' : 'right';
      else local.dir = dy < 0 ? 'behind' : 'front';
      const steps = Math.max(1, Math.ceil(Math.max(Math.abs(dx), Math.abs(dy)) / 5));
      const stepX = dx / steps;
      const stepY = dy / steps;
      for (let i = 0; i < steps; i++) {
        const nx = Math.max(20, Math.min(local.worldW - 20, local.x + stepX));
        const ny = Math.max(20, Math.min(local.worldH - 20, local.y + stepY));
        if (local.flying || serverMapCanStandAt(local, nx, local.y)) local.x = nx;

    function serverMapGetMaskPixel(local, x, y){
      if (!local.maskLoaded || !local.mask.naturalWidth) return null;
      const sx = Math.floor((x / local.worldW) * local.mask.naturalWidth);
      const sy = Math.floor((y / local.worldH) * local.mask.naturalHeight);
      if (sx < 0 || sy < 0 || sx >= local.mask.naturalWidth || sy >= local.mask.naturalHeight) return { r:255, g:0, b:0, a:255 };
      try {
        if (!local.off) {
          local.off = document.createElement('canvas');
          local.off.width = local.mask.naturalWidth;
          local.off.height = local.mask.naturalHeight;

    function serverMapMaskKind(local, x, y){
      const pixel = serverMapGetMaskPixel(local, x, y);

      if (serverMapNear(pixel,255,0,0)) return 'blocked';
      if (serverMapNear(pixel,129,255,125)) return 'meeting';

      const points = [[x,y],[x-18,y],[x+18,y],[x,y-18],[x-18,y-18],[x+18,y-18]];

    function drawServerMapPlayer(ctx, local, player, isMe){
      const skin = player.skin === 'turuturu' ? 'turuturu' : 'nikorihito';
      const dir = ['front','behind','left','right'].includes(player.dir) ? player.dir : 'front';
      const x = Number(player.x || local.x) - local.cameraX;
      const y = Number(player.y || local.y) - local.cameraY;
      const behind = serverMapMaskKind(local, Number(player.x || local.x), Number(player.y || local.y)) === 'behind';
      ctx.save();
      ctx.globalAlpha = behind ? .48 : (isMe ? 1 : .92);
      if (player.flying) drawServerAirplane(ctx, local, player, x, y, skin, dir);
      else drawServerCharacter(ctx, local, x, y, skin, dir);
      ctx.font = '900 13px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const label = player.name || 'player';
      const labelY = player.flying ? y - AIRPLANE_HEIGHT - 20 : y - (DRAW_HEIGHT[skin] || 88) - 18;
      const width = ctx.measureText(label).width + 16;
      ctx.fillStyle = 'rgba(255,255,255,.82)';
      ctx.beginPath();
      ctx.roundRect(x - width / 2, labelY - 12, width, 24, 12);
      ctx.fill();
      ctx.fillStyle = isMe ? '#087fa8' : '#123047';
      ctx.fillText(label, x, labelY);
      ctx.restore();
    }
    function drawServerCharacter(ctx, local, x, y, skin, dir){
      const image = local.skins[skin]?.[dir] || local.skins.nikorihito.front;
      const h = DRAW_HEIGHT[skin] || 88;
      const w = image.complete && image.naturalWidth ? h * image.naturalWidth / image.naturalHeight : h;
      if (image.complete && image.naturalWidth) ctx.drawImage(image, x - w / 2, y - h, w, h);
      else {
        ctx.fillStyle = skin === 'turuturu' ? '#4dd7f0' : '#fff';
        ctx.fillRect(x - w / 2, y - h, w, h);
      }
    }
    function drawServerAirplane(ctx, local, player, x, y, skin, dir){
      const image = local.airplane;
      const h = AIRPLANE_HEIGHT;
      const w = image.complete && image.naturalWidth ? h * image.naturalWidth / image.naturalHeight : 240;
      if (image.complete && image.naturalWidth) {
        ctx.save();
        if (dir === 'left') {
          ctx.translate(x, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(image, -w / 2, y - h + 18, w, h);
        } else ctx.drawImage(image, x - w / 2, y - h + 18, w, h);
        ctx.restore();
      }
      const pilot = local.skins[skin]?.front;
      if (pilot?.complete && pilot.naturalWidth) ctx.drawImage(pilot, x - 23, y - 183, 46, 46);
    }
    function renderServerMapMessages(){
      const root = $('serverMapChatLog');
      if (!root) return;
      root.innerHTML = '';
      if (!state.mapMessages.length) {
        root.innerHTML = '<div class="empty">マップチャットはまだありません。</div>';
        return;
      }
      state.mapMessages.forEach(message => {
        const row = document.createElement('div');
        row.className = 'info-card';
        row.textContent = `${message.name || 'user'}: ${message.text || ''}`;
        root.appendChild(row);
      });
    }
    function renderChat(room){
      $('serverRoomContent').innerHTML = '<div id="chatLog" class="chat"></div><form id="chatForm" class="chat-form"><textarea id="chatInput" maxlength="500" placeholder="メッセージを入力。Enterで送信、Shift+Enterで改行できます。" autocomplete="off"></textarea><button type="submit">送信</button></form>';
      const serverId = getServerId(state.activeServer);
      const messagesRef = ref(db, `serverMessages/${serverId}/${room.roomId || room.id}`);
      const callback = snap => {
        const log = $('chatLog');
        if (!log) return;
        log.innerHTML = '';
        const messages = Object.entries(snap.val() || {}).map(([messageId,value]) => ({ messageId, id:messageId, ...value })).sort((a,b) => Number(a.createdAt || 0) - Number(b.createdAt || 0)).slice(-120);
        if (!messages.length) log.innerHTML = '<div class="empty">まだメッセージはありません。</div>';
        for (const msg of messages) log.appendChild(messageRow(room, msg));
        log.scrollTop = log.scrollHeight;
      };
      onValue(messagesRef, callback, error => {
        console.error('serverMessages onValue failed', { serverId, roomId:room.roomId || room.id }, error);
        setStatus(describeError(error, 'メッセージの読み込みに失敗しました。'));
      });
      state.messagesUnsub = () => off(messagesRef, 'value', callback);
      const form = $('chatForm');
      const input = $('chatInput');
      input.addEventListener('keydown', event => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });
      form.onsubmit = async event => {
        event.preventDefault();
        const text = input.value.trim().slice(0,500);
        if (!text) return;
        input.value = '';
        const messageRef = push(messagesRef);
        const now = Date.now();
        const messageId = messageRef.key;
        try {
          await set(messageRef, { messageId, id:messageId, uid:auth.currentUser.uid, name:userName(auth.currentUser), role:state.activeMember?.role || 'member', text, createdAt:now, updatedAt:now, edited:false });
        } catch (error) {
          console.error('send server message failed', error);
          setStatus(describeError(error, 'メッセージ送信に失敗しました。'));
        }
      };
    }
    function messageRow(room, msg){
      const member = state.members[msg.uid] || { uid:msg.uid, name:msg.name, role:msg.role };
      const row = document.createElement('div');
      row.className = 'msg';
      const time = new Date(Number(msg.createdAt) || Date.now()).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
      row.innerHTML = `<div><div><span class="msg-name">${safeText(memberName(member))}</span><span class="msg-meta">${time}${msg.edited ? ' (編集済み)' : ''}</span></div><div class="msg-text"></div></div>`;
      row.querySelector('.msg-text').textContent = String(msg.text || '');
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      const own = msg.uid === auth.currentUser?.uid;
      const moderator = canOperate();
      if (own) {
        const edit = document.createElement('button');
        edit.type = 'button';
        edit.className = 'secondary small';
        edit.textContent = '編集';
        edit.onclick = () => editMessage(room, msg);
        actions.appendChild(edit);
      }
      if (own || moderator) {
        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'danger small';
        del.textContent = '削除';
        del.onclick = () => deleteMessage(room, msg);
        actions.appendChild(del);
      }
      row.appendChild(actions);
      return row;
    }
    async function editMessage(room, msg){
      if (msg.uid !== auth.currentUser?.uid) return setStatus('メッセージ編集は投稿者本人のみ可能です。');
      const result = await modal({
        title:'メッセージ編集',
        body:'本文を変更します。',
        fields:[{ id:'text', label:'本文', value:msg.text || '', type:'textarea', max:500 }]
      });
      if (!result) return;
      const text = String(result.text || '').trim().slice(0,500);
      if (!text) return setStatus('本文が空です。');
      const serverId = getServerId(state.activeServer);
      const roomId = room.roomId || room.id;
      const messageId = msg.messageId || msg.id;
      try {
        await update(ref(db, `serverMessages/${serverId}/${roomId}/${messageId}`), { text, updatedAt:Date.now(), edited:true });
        setStatus('メッセージを更新しました。');
      } catch (error) {
        console.error('editMessage failed', { serverId, roomId, messageId }, error);
        setStatus(describeError(error, 'メッセージ編集に失敗しました。'));
      }
    }
    async function deleteMessage(room, msg){
      const own = msg.uid === auth.currentUser?.uid;
      if (!own && !canOperate()) return setStatus('メッセージ削除権限がありません。');
      if (!confirm('このメッセージを削除しますか？')) return;
      const serverId = getServerId(state.activeServer);
      const roomId = room.roomId || room.id;
      const messageId = msg.messageId || msg.id;
      try {
        await remove(ref(db, `serverMessages/${serverId}/${roomId}/${messageId}`));
        setStatus('メッセージを削除しました。');
      } catch (error) {
        console.error('deleteMessage failed', { serverId, roomId, messageId }, error);
        setStatus(describeError(error, 'メッセージ削除に失敗しました。'));
      }
    }
    function renderVoice(room){
      $('serverRoomContent').innerHTML = '<div class="info-card"><div class="section-title">🔊 ボイスルーム</div><div class="hint">入退室状態とマイク/カメラ/画面共有の同期UIです。</div></div><div class="row" style="margin-top:12px"><button id="voiceJoinBtn" type="button">入室</button><button id="voiceMicBtn" class="secondary" type="button">マイクON</button><button id="voiceCameraBtn" class="secondary" type="button">カメラON</button><button id="voiceScreenBtn" class="secondary" type="button">画面共有ON</button><button id="voiceLeaveBtn" class="secondary" type="button">退出</button></div><div id="voiceMembers" class="server-list" style="margin-top:12px"></div>';
      const serverId = getServerId(state.activeServer);
      const voicePath = `serverVoiceState/${serverId}/${room.roomId || room.id}`;
      const updateVoice = async patch => update(ref(db, `${voicePath}/${auth.currentUser.uid}`), { uid:auth.currentUser.uid, name:userName(auth.currentUser), joinedAt:Date.now(), ...patch });
      $('voiceJoinBtn').onclick = () => updateVoice({ micEnabled:false, cameraEnabled:false, screenSharing:false });
      $('voiceMicBtn').onclick = () => updateVoice({ micEnabled:true });
      $('voiceCameraBtn').onclick = () => updateVoice({ cameraEnabled:true });
      $('voiceScreenBtn').onclick = () => updateVoice({ screenSharing:true });
      $('voiceLeaveBtn').onclick = () => remove(ref(db, `${voicePath}/${auth.currentUser.uid}`));
      const voiceRef = ref(db, voicePath);
      const callback = snap => {
        const root = $('voiceMembers');
        if (!root) return;
        root.innerHTML = '';
        const people = Object.values(snap.val() || {});
        if (!people.length) root.innerHTML = '<div class="empty">まだ誰も入室していません。</div>';
        for (const item of people) {
          const row = document.createElement('div');
          row.className = 'server-card';
          row.innerHTML = `<div class="server-icon">🔊</div><div><div class="server-name">${safeText(memberName(state.members[item.uid] || item))}</div><div class="server-host">mic:${item.micEnabled?'on':'off'} / cam:${item.cameraEnabled?'on':'off'} / screen:${item.screenSharing?'on':'off'}</div></div>`;
          root.appendChild(row);
        }
      };
      onValue(voiceRef, callback, error => console.error('serverVoiceState onValue failed', error));
      state.voiceUnsub = () => off(voiceRef, 'value', callback);
    }
    function renderMembers(){
      const root = $('serverMembers');
      root.innerHTML = '';
      const members = Object.values(state.members || {});
      if (!members.length) {
        root.innerHTML = '<div class="empty">メンバー情報を読み込み中です。</div>';
        return;
      }
      for (const member of members) {
        const row = document.createElement('div');
        row.className = 'member-row';
        row.innerHTML = `<div>${safeText(memberName(member))}</div><div class="member-role">${safeText(roleLabel(member.role))}</div>`;
        root.appendChild(row);
      }
    }
    function renderSettings(){
      const root = $('serverSettings');
      root.hidden = !canOperate();
      root.innerHTML = '';
      if (!canOperate() || !state.activeServer) return;
      const server = state.activeServer;
      root.innerHTML = `
        <div class="section-title">設定</div>
        <label>サーバー名<input id="settingName" maxlength="28" /></label>
        <label>アイコン<input id="settingIcon" maxlength="80" /></label>
        <label>説明<textarea id="settingDescription" maxlength="120"></textarea></label>
        <div class="row"><button id="settingSaveBtn" type="button">保存</button><button id="reissueBtn" class="secondary" type="button">参加コード再発行</button></div>
        <div class="info-card"><div class="server-host">参加コード</div><strong id="joinCodeDisplay"></strong><div class="row" style="margin-top:8px"><button id="copyJoinCodeBtn" class="secondary small" type="button">コピー</button></div></div>
        <div id="roleTools"></div>
        <div id="deleteServerTools"></div>`;
      $('settingName').value = server.name || '';
      $('settingIcon').value = server.icon || '🌐';
      $('settingDescription').value = server.description || '';
      $('joinCodeDisplay').textContent = `${server.joinCode || '-'} / 有効日: ${server.joinCodeDate || '-'}`;
      $('copyJoinCodeBtn').onclick = () => copyText(server.joinCode || '', '参加コードをコピーしました。');
      $('settingSaveBtn').onclick = async () => {
        const patch = { name:safeName($('settingName').value || 'サーバー'), icon:String($('settingIcon').value || '🌐').trim().slice(0,80), description:safeDescription($('settingDescription').value), updatedAt:Date.now() };
        const serverId = getServerId(server);
        try {
          await update(ref(db, `servers/${serverId}`), patch);
          Object.assign(state.activeServer, patch);
          $('activeServerName').textContent = patch.name;
          $('activeServerIcon').textContent = patch.icon;
          setStatus('サーバー設定を保存しました。');
        } catch (error) {
          console.error('save server settings failed', error);
          setStatus(describeError(error, 'サーバー設定の保存に失敗しました。'));
        }
      };
      $('reissueBtn').onclick = async () => {
        const serverId = getServerId(server);
        try {
          await ensureDailyCode({ ...server, serverId, id:serverId, joinCodeDate:'' });
          Object.assign(state.activeServer, { serverId, id:serverId }, (await get(ref(db, `servers/${serverId}`))).val() || {});
          renderSettings();
          setStatus('参加コードを再発行しました。');
        } catch (error) {
          console.error('reissue join code failed', error);
          setStatus(describeError(error, '参加コード再発行に失敗しました。'));
        }
      };
      renderRoleTools();
      renderDeleteServerTools();
    }
    function renderRoleTools(){
      const root = $('roleTools');
      if (!root) return;
      root.innerHTML = '<div class="section-title">権限管理</div>';
      for (const member of Object.values(state.members || {})) {
        const row = document.createElement('div');
        row.className = 'member-row';
        const label = document.createElement('div');
        label.textContent = memberName(member);
        const select = document.createElement('select');
        select.disabled = member.uid === state.activeServer.hostUid;
        for (const role of ['operator','member','guest']) {
          const option = document.createElement('option');
          option.value = role;
          option.textContent = role;
          option.selected = roleLabel(member.role) === role;
          select.appendChild(option);
        }
        select.onchange = async () => {
          try {
            await update(ref(db, `serverMembers/${getServerId(state.activeServer)}/${member.uid}`), { role:select.value, updatedAt:Date.now() });
          } catch (error) {
            console.error('role update failed', error);
            setStatus(describeError(error, '権限更新に失敗しました。'));
          }
        };
        row.append(label, select);
        root.appendChild(row);
      }
    }
    function renderDeleteServerTools(){
      const root = $('deleteServerTools');
      if (!root) return;
      root.innerHTML = '';
      if (!canDeleteServer()) return;
      root.innerHTML = '<div class="section-title">危険な操作</div><div class="empty">サーバー本体と関連データを完全に削除します。</div><button id="deleteServerBtn" class="danger" type="button">サーバーを削除</button>';
      $('deleteServerBtn').onclick = deleteActiveServer;
    }
    async function deleteActiveServer(){
      const user = auth.currentUser;
      const activeServer = state.activeServer;
      const serverId = getServerId(activeServer);
      if (!user || !activeServer) return;
      if (activeServer.hostUid !== user.uid) return setStatus('サーバーを削除できるのはホストだけです。');
      const ok = await confirmByName('サーバー削除', 'このサーバーを完全に削除します。この操作は元に戻せません。', activeServer.name || 'サーバー');
      if (!ok) return setStatus('サーバー名が一致しないため、削除を中止しました。');
      setStatus('サーバーを削除しています...');
      try {
        const latest = (await get(ref(db, `servers/${serverId}`))).val();
        if (!latest) {
          closeActiveServer();
          subscribeUserServers(user);
          return setStatus('このサーバーは削除されました。');
        }
        if (latest.hostUid !== user.uid) throw new Error('ONLY_HOST_CAN_DELETE_SERVER');
        const [membersSnap, codeSnap] = await Promise.all([
          get(ref(db, `serverMembers/${serverId}`)).catch(error => { console.error('serverMembers read before delete failed', error); return null; }),
          get(dbQuery(ref(db, 'serverCodes'), orderByChild('serverId'), equalTo(serverId))).catch(error => { console.error('serverCodes read before delete failed', error); return null; })
        ]);
        const deletePaths = [
          `serverRooms/${serverId}`,
          `serverMessages/${serverId}`,
          `serverVoiceState/${serverId}`,
          `serverMapRooms/${serverId}`,
          `serverMapPlayers/${serverId}`,
          `serverMapMessages/${serverId}`,
          `serverMapState/${serverId}`,
          `serverMembers/${serverId}`,
          ...Object.keys(membersSnap?.val() || {}).map(uid => `userServers/${uid}/${serverId}`),
          ...(latest.joinCode ? [`serverCodes/${latest.joinCode}`] : []),
          ...Object.keys(codeSnap?.val() || {}).map(code => `serverCodes/${code}`),
          `servers/${serverId}`
        ];
        console.log('DELETE SERVER paths:', deletePaths);
        const failures = [];
        for (const path of [...new Set(deletePaths)]) {
          try {
            await remove(ref(db, path));
          } catch (error) {
            console.error('DELETE SERVER path failed:', path, error);
            failures.push(`${path}: ${error?.code || error?.message || error}`);
          }
        }
        if (failures.length) throw new Error(`DELETE_SERVER_PARTIAL_FAILURE: ${failures.join(', ')}`);
        closeActiveServer();
        subscribeUserServers(user);
        setStatus('サーバーを削除しました。');
      } catch (error) {
        console.error('DELETE SERVER FAILED:', error?.code, error?.message, error);
        setStatus(`${describeError(error, 'サーバー削除に失敗しました。')} / serverId: ${serverId}`);
      }
    }
    function showForUser(user){
      $('userLabel').textContent = user ? `${userName(user)} / ${user.isAnonymous ? 'ゲスト' : 'Googleログイン'}` : '未ログイン';
      $('googleLoginBtn').hidden = Boolean(user && !user.isAnonymous);
      const allowed = isGoogleUser(user);
      $('gate').hidden = allowed;
      $('serverHome').hidden = !allowed;
      if (!allowed) {
        closeActiveServer();
        renderServerList([]);
        return;
      }
      subscribeUserServers(user);
    }

    $('homeBtn').onclick = () => location.href = './index.html';
    $('googleLoginBtn').onclick = async () => signInWithPopup(auth, provider).catch(error => setStatus(describeError(error, 'Googleログインに失敗しました。')));
    $('serverJoinBtn').onclick = joinServer;
    $('serverCreateBtn').onclick = createServer;
    $('serverCloseBtn').onclick = closeActiveServer;
    $('serverJoinCode').addEventListener('input', event => event.target.value = safeCode(event.target.value));
    $('serverJoinCode').addEventListener('keydown', event => { if (event.key === 'Enter') joinServer(); });
    onAuthStateChanged(auth, showForUser);
  </script>
